<!DOCTYPE html> <!-- HTML 문서 타입 선언 -->
<html lang="ko"> <!-- 페이지 언어를 한국어로 설정 -->
<head> <!-- 메타 정보와 스타일 시트 링크를 포함하는 문서 헤더 -->
    <meta charset="UTF-8"> <!-- 문자 인코딩을 UTF-8로 설정 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- 모바일 화면 크기에 맞는 뷰포트 설정 -->
    <title>대가대 스마트 캠퍼스 가이드</title> <!-- 브라우저 탭에 표시될 페이지 제목 -->
    <link rel="stylesheet" href="style.css"> <!-- 외부 CSS 파일을 연결 -->
</head>
<body> <!-- 실제 페이지 콘텐츠가 표시될 바디 영역 -->
    <!-- 검색 입력창과 결과를 표시하는 사이드 패널 -->
    <div id="search-container"> <!-- 검색 UI를 감싸는 패널 영역; app.js가 id로 선택하여 검색 기능을 연결합니다. -->
    <div id="start-location-toggle" style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid #eee;"> <!-- 현재 위치 토글 버튼 레이아웃 -->
        <span style="font-size: 13px; font-weight: bold; color: #333;">📍 출발지를 현재 위치로 설정</span> <!-- 토글 설명 텍스트 -->
        <label class="switch" style="position: relative; display: inline-block; width: 44px; height: 22px;"> <!-- 토글 스위치 스타일 컨테이너 -->
            <input type="checkbox" id="use-myloc-start" style="opacity: 0; width: 0; height: 0;"> <!-- 현재 위치 사용 여부를 선택하는 체크박스; app.js에서 change 이벤트로 처리를 연결 -->
            <span class="slider" style="position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 22px;"></span> <!-- 스위치 버튼의 시각적 슬라이더 -->
        </label>
    </div>

    <div id="search-box"> <!-- 검색 입력 필드와 버튼을 그룹화; search-input과 search-button은 app.js에서 직접 참조 -->
        <input type="text" id="search-input" placeholder="건물명, 학과, 시설 검색..."> <!-- 사용자가 검색어를 입력하는 텍스트 필드 -->
        <button id="search-button" type="button">검색</button> <!-- 검색을 실행하는 버튼; 클릭 시 searchBuildings 함수를 호출 -->
    </div>
    <button id="myloc-button" type="button" style="width: 100%; margin-top: 8px; padding: 8px; background-color: #007bff; color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer;">📍 현재 내 위치로 이동</button> <!-- 버튼 클릭 시 현재 위치로 지도를 이동; app.js에서 click 이벤트 핸들러가 연결 -->
    <ul id="search-results"></ul> <!-- 검색 결과 항목을 나열하는 리스트; app.js에서 검색 결과를 동적으로 추가 -->
</div>
    
    <!-- 카카오 지도를 렌더링할 요소 -->
    <div id="map"></div> <!-- 지도 API가 그려질 컨테이너 -->

    <!-- 카카오 지도 SDK를 로드 -->
    <script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=49b3f4678edb6d8ed52cb800f0a527c5"></script> <!-- 카카오맵 JavaScript SDK를 로드 -->
    <!-- 사용자 인터랙션 및 검색 로직을 담은 스크립트 -->
    <script src="app.js"></script> <!-- 앱의 주요 JavaScript 로직을 불러옴 -->
</body>
</html> <!-- 문서 종료 -->
