<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>대가대 스마트 캠퍼스 가이드</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 검색 입력창과 결과를 표시하는 사이드 패널 -->
    <div id="search-container">
    <div id="start-location-toggle" style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid #eee;">
        <span style="font-size: 13px; font-weight: bold; color: #333;">📍 출발지를 현재 위치로 설정</span>
        <label class="switch" style="position: relative; display: inline-block; width: 44px; height: 22px;">
            <input type="checkbox" id="use-myloc-start" style="opacity: 0; width: 0; height: 0;">
            <span class="slider" style="position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 22px;"></span>
        </label>
    </div>

    <div id="search-box">
        <input type="text" id="search-input" placeholder="건물명, 학과, 시설 검색...">
        <button id="search-button" type="button">검색</button>
    </div>
    <ul id="search-results"></ul>
</div>
    
    <!-- 카카오 지도를 렌더링할 요소 -->
    <div id="map"></div>

    <!-- 카카오 지도 SDK를 로드 -->
    <script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=49b3f4678edb6d8ed52cb800f0a527c5"></script>
    <!-- 사용자 인터랙션 및 검색 로직을 담은 스크립트 -->
    <script src="app.js"></script>
</body>
</html>
